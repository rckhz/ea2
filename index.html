<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ea2</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
</head>

<body>
    <div class="luiz">
        <img class="lantern" src="lanterna.png">
        <div class="light"></div>
        <div class="fundo1"></div>
    </div>


    <div class="guide">Use o joystick para mover a lanterna. Botões + / − ajustam a opacidade.</div>
    <div class="fundo"></div>

    <div class="controles">
        <div class="joystick" id="joystick">
            <div class="joystick-base"></div>
            <div class="joystick-stick" id="joystickStick"></div>
        </div>

        <div class="botoes">
            <button class="btn" id="btnMais" aria-label="Aumentar opacidade">+</button>
            <button class="btn" id="btnMenos" aria-label="Diminuir opacidade">−</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
